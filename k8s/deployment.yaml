apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-booking-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hotel-booking

  template:
    metadata:
      labels:
        app: hotel-booking

    spec:
      containers:
      - name: hotel-booking
        image: hotel-booking-system
        imagePullPolicy: Never
        env:
        - name: SERVER_SSL_ENABLED
          value: "false"
        - name: DB_HOST
          value: "mysql-service"
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "hotel_booking_system"
        - name: DB_USERNAME
          value: "root"
        - name: DB_PASSWORD
          value: "0001"
        - name: SPRING_CACHE_TYPE
          value: "simple"
        - name: MANAGEMENT_HEALTH_REDIS_ENABLED
          value: "false"
        ports:
        - containerPort: 8080
        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          failureThreshold: 18
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
