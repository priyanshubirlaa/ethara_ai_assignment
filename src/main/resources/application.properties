spring.application.name=Hotel-Booking-System
server.port=${PORT:8080}

# ==========================
# Database
# ==========================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hotel_booking_system}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# ==========================
# Actuator
# ==========================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# ==========================
# Info Endpoint
# ==========================
info.app.name=Hotel Booking System
info.app.description=Spring Boot Backend for Hotel Booking
info.app.version=1.0.0
info.app.developer=Priyanshu Birla

management.info.env.enabled=true

# ==========================
# Prometheus
# ==========================
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# ==========================
# Redis
# ==========================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=3000ms

spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ==========================
# Logging
# ==========================
logging.level.root=INFO
logging.level.com.hotel.book=INFO

# ==========================
# SSL
# ==========================
server.ssl.enabled=${SERVER_SSL_ENABLED:true}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:classpath:keystore.p12}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:YOUR_SSL_PASSWORD}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:YOUR_SSL_ALIAS}

# ==========================
# Gemini API
# ==========================
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}

# ==========================
# Mail Configuration
# ==========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:YOUR_MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================
# Server
# ==========================
server.address=0.0.0.0